<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div style="display: flex;">
            <a href="index.html">HOME</a>
            <a href="eventos.html">EVENTOS</a>
            <a href="contato.html">CONTATO</a>
            <div class="dropdown">
                <button class="dropbtn">CURSOS</button>
                <div class="dropdown-content">
                    <a href="ads.html">Análise e Desenvolvimento de Sistemas</a>
                    <a href="engproducao.html">Engenharia de Produção</a>
                </div>
            </div>
            <a href="login.html">ENTRAR</a>
        </div>
        <a href="sobre.html">SOBRE</a>
    </nav>

    <header class="cabecalho_principal">
        <img src="img/Logo.jpg" alt="Instituto Federal São Paulo">
    </header>

    <main>
        <h2>Mande uma mensagem</h2>

        <form action="#" method="post">
            <ul class="lista_formulario">
                <li>
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" class="campo_curto">
                </li>
                <li>
                    <label for="email">E-Mail</label>
                    <input type="email" id="email" name="email" class="largura_total">
                </li>
                <li>
                    <label for="telefone">Telefone (99) 99999-9999</label>
                    <input type="tel" id="telefone" name="telefone" class="largura_total" pattern="\([0-9]{2}\) [0-9]{5}-[0-9]{4}" required>
                </li>
                <li>
                    <label for="assunto">Assunto</label>
                    <select name="assunto" id="assunto" class="largura_total">
                        <option value="">-- Selecione --</option>
                        <option value="reclamacao">Reclamação</option>
                        <option value="sugestao">Sugestão</option>
                    </select>
                </li>
                <li>
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" name="mensagem" rows="4" class="largura_total"></textarea>
                </li>
                <li>
                    <fieldset>
                        <legend>Opções de Resposta</legend>
                        E-Mail <input type="checkbox" name="opcao_email" value="email">
                        Telefone <input type="checkbox" name="opcao_telefone" value="telefone">
                    </fieldset>
                </li>
            </ul>
            
            <input type="submit" value="Enviar" class="botao_verde">
        </form>
    </main>

    <footer>
        <a href="https://www.facebook.com/ifsppirituba/?locale=pt_BR" target="_blank">
            <img src="img/facebook.png" alt="Facebook" width="40">
        </a>
        <p>IFSP - Câmpus Pirituba - Av. Mutinga, 951 - Jardim Santo Elias - CEP: 05110-000 - São Paulo/SP - Contato: (011) 2504-0100</p>
    </footer>

</body>
</html>
